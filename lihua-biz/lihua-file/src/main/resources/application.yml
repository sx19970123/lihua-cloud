server:
  port: 8083
  forward-headers-strategy: framework
spring:
  application:
    name: lihua-file
    version: 2.0.2
  profiles:
    # 切换开发/生产环境
    active: dev
  threads:
    virtual:
      # 开启虚拟线程
      enabled: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  banner:
    location: classpath:banner.txt
    charset: UTF-8
  # 配置后可正常拦截404异常
  web:
    resources:
      add-mappings: false
  # api响应时全局忽略null，
  # 如不需要可将此配置删除（适用于controller 返回 ApiResponseModel 的情况）
  # 如在 controller 中返回 String，则需要全局搜索：JsonUtils.toJsonIgnoreNulls(response(resultCodeEnum, msg, data)); JsonUtils.toJsonIgnoreNulls 修改为 JsonUtils.toJson
  jackson:
    default-property-inclusion: non_null

  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        username: nacos
        password: 123456


mybatis-plus:
  global-config:
    db-config:
      # 逻辑删除对应字段
      logic-delete-field: delFlag
      # 逻辑删除后的字段对应值
      logic-delete-value: 1
      # 逻辑删除前的字段对应值
      logic-not-delete-value: 0
  # 将 xml 放到 java 目录下
  mapper-locations: classpath*:com/lihua/**/mapper/**/*.xml