 # 系统配置
token:
  # 令牌过期时间（分钟）
  tokenExpireTime: 60
  # 令牌刷新阈值（分钟）距令牌过期15分钟内时，有新请求时对令牌进行刷新
  refreshThreshold: 15

# 附件配置
attachment:
  # 附件下载生成链接过期时间（分钟）
  fileDownloadExpireTime: 30
  # 文件上传服务类型：LOCAL（传统本地上传）、ALIYUN-OSS（阿里云oss）
  uploadFileModel: LOCAL
  # 公开文件的业务编码
  uploadPublicBusinessCode: [UserAvatar, SystemNotice, EditorIndex]
  # 上传文件路径，LOCAL模式下为服务器目录；ALIYUN-OSS模式下为桶下目录
  uploadFilePath: lihua

spring:
  # 数据源配置
  datasource:
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://localhost:3306/lihua
          username: root
          password: 123456
          hikari:
            # 最大连接数默认 10
            maximum-pool-size: 20
            # 最小空闲连接 默认10
            minimum-idle: 5
            # 等待连接池连接最大时长（毫秒）
            connection-timeout: 5000
            # 空闲连接最大时长（毫秒）
            idle-timeout: 120000
            # 连接生命时长（毫秒）
            max-lifetime: 1800000

  # 多数据源配置，使用dynamic-datasource实现，官方文档：https://www.kancloud.cn/tracy5546/dynamic-datasource/2264611
#        slave_1:
#          driver-class-name: com.mysql.cj.jdbc.Driver
#          url: jdbc:mysql://localhost:3306/dynamic
#          username: root
#          password: 123456
#          hikari:
#            # 最大连接数默认 10
#            maximum-pool-size: 30
#            # 最小空闲连接 默认10
#            minimum-idle: 30
#            # 等待连接池连接最大时长（毫秒）
#            connection-timeout: 5000
#            # 空闲连接最大时长（毫秒）
#            idle-timeout: 0
#            # 连接生命时长（毫秒）
#            max-lifetime: 25800
  # redisson配置，官方文档：https://redisson.pro/docs/integration-with-spring/#spring-boot-starter
  redis:
    redisson:
      config: |
        singleServerConfig:
          address: "redis://127.0.0.1:6379"
          database: 0
          # 命令超时时间
          timeout: 3000
          # 连接超时时间
          connectTimeout: 10000
          # 连接池最大连接数
          connectionPoolSize: 64
          # 最小空闲连接数
          connectionMinimumIdleSize: 10
        # 自定义序列化器
        codec: !<com.lihua.cache.config.TypedRedissonJsonCodec> {}
# 日志配置
logging:
  file:
    name: /Users/yukino/my-project/data/lihua/logs/lihua.log
  level:
    com.lihua: debug
    org.springframework: info

# oss
# 需要attachment配置中uploadFileModel为【ALIYUN-OSS】，同配置项 uploadFilePath 为桶下目录
aliyun:
  oss:
    endpoint:
    access-key-id:
    access-key-secret:
    bucket-name:

 # spring doc 接口文档
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true