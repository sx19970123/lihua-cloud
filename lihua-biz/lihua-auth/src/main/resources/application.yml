server:
  port: 8082
  forward-headers-strategy: framework
spring:
  application:
    name: lihua-auth
    version: 2.0.2
  profiles:
    # 切换开发/生产环境
    active: dev
  threads:
    virtual:
      # 开启虚拟线程
      enabled: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  banner:
    location: classpath:banner.txt
    charset: UTF-8
  # 配置后可正常拦截404异常
  web:
    resources:
      add-mappings: false
  # api响应时全局忽略null，
  # 如不需要可将此配置删除（适用于controller 返回 ApiResponseModel 的情况）
  # 如在 controller 中返回 String，则需要全局搜索：JsonUtils.toJsonIgnoreNulls(response(resultCodeEnum, msg, data)); JsonUtils.toJsonIgnoreNulls 修改为 JsonUtils.toJson
  jackson:
    default-property-inclusion: non_null

  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        username: nacos
        password: 123456

  # 滑块验证码配置， 详细请看 cloud.tianai.captcha.autoconfiguration.ImageCaptchaProperties 类
captcha:
  # 如果项目中使用到了redis，滑块验证码会自动把验证码数据存到redis中， 这里配置redis的key的前缀
  prefix: REDIS_CACHE_CAPTCHA
  # 验证码过期时间，默认是2分钟,单位毫秒， 可以根据自身业务进行调整
  expire:
    # 缓存时间 1分钟
    default: 60000
    # 点选类型验证码缓存时间 2分钟
    WORD_IMAGE_CLICK: 120000
  # 使用自定义资源
  init-default-resource: true
  # 缓存控制
  local-cache-enabled: true
  # 验证码缓存数量
  local-cache-size: 20
  # 缓存拉取失败后等待时间
  local-cache-wait-time: 5000
  # 缓存检查间隔
  local-cache-period: 2000
  # 配置字体包，供文字点选验证码使用,可以配置多个
  font-path:
    - classpath:captcha-font/荆南波波黑-Bold.ttf # 免费可商用，来源：https://ziyouziti.com/mianfeiziti-444.html
    - classpath:captcha-font/也字工厂小石头.ttf # 免费可商用，来源：https://ziyouziti.com/mianfeiziti-457.html
  secondary:
    # 开启二次验证
    enabled: true
    # 二次验证过期时间 一分钟
    expire: 60000
    # 二次验证缓存key前缀
    keyPrefix: REDIS_CACHE_SECONDARY_CAPTCHA