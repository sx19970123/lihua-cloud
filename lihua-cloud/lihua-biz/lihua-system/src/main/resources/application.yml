server:
  port: ${SERVER_PORT:8084}
  forward-headers-strategy: framework
spring:
  application:
    name: lihua-system
    version: 2.1.0
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:123456}
      # 服务发现
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      # 配置中心
      config:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        file-extension: yaml
        import-check:
          enabled: true
  config:
    import:
      - nacos:${spring.application.name}.yaml?group=${spring.application.name}
      - nacos:lihua-common.yaml?group=lihua-common
      - nacos:lihua-resilience.yaml?group=lihua-resilience
  threads:
    virtual:
      # 开启虚拟线程
      enabled: true

  banner:
    location: classpath:banner.txt
    charset: UTF-8
  # 配置后可正常拦截404异常
  web:
    resources:
      add-mappings: false
  # api响应时全局忽略null，
  # 如不需要可将此配置删除（适用于controller 返回 ApiResponseModel 的情况）
  # 如在 controller 中返回 String，则需要全局搜索：JsonUtils.toJsonIgnoreNulls(response(resultCodeEnum, msg, data)); JsonUtils.toJsonIgnoreNulls 修改为 JsonUtils.toJson
  jackson:
    default-property-inclusion: non_null

mybatis-plus:
  global-config:
    db-config:
      # 逻辑删除对应字段
      logic-delete-field: delFlag
      # 逻辑删除后的字段对应值
      logic-delete-value: 1
      # 逻辑删除前的字段对应值
      logic-not-delete-value: 0
  # 将 xml 放到 java 目录下
  mapper-locations: classpath*:com/lihua/**/mapper/**/*.xml
